<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NaijaWorld News</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #008751;
      --white: #f5f0e8;
      --ink: #1a1a1a;
      --gold: #c9a84c;
      --card-bg: #ffffff;
      --border: #e2ddd4;
      --tag-global: #1a3a5c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--white);
      font-family: 'Source Sans 3', sans-serif;
      color: var(--ink);
      min-height: 100vh;
    }

    header {
      background: var(--green);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
    }

    .brand-name span { color: var(--gold); }

    .brand-tagline {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .refresh-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-family: 'Source Sans 3', sans-serif;
      cursor: pointer;
    }

    .header-bar {
      background: var(--gold);
      padding: 5px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .last-updated, .next-refresh {
      font-size: 0.68rem;
      color: rgba(26,26,26,0.75);
    }

    /* Live pulse indicator */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      background: #e74c3c;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .tabs {
      display: flex;
      background: var(--card-bg);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 88px;
      z-index: 90;
    }

    .tab {
      flex: 1;
      padding: 13px 10px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      text-transform: uppercase;
    }

    .tab.active-nigeria { color: var(--green); border-bottom-color: var(--green); }
    .tab.active-global { color: var(--tag-global); border-bottom-color: var(--tag-global); }

    .section { display: none; padding: 16px 14px 80px; }
    .section.active { display: block; }

    .section-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-ng { background: var(--green); }
    .dot-gl { background: var(--tag-global); }

    .cards-grid { display: flex; flex-direction: column; gap: 14px; }

    /* NEW badge for fresh articles */
    .new-badge {
      display: inline-block;
      background: #e74c3c;
      color: white;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 4px;
      vertical-align: middle;
      margin-left: 6px;
      text-transform: uppercase;
    }

    .card {
      background: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,0.07);
      border: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      display: block;
      animation: fadeUp 0.4s ease forwards;
      opacity: 0;
    }

    .card.is-new {
      border-left: 3px solid #e74c3c;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-image { width: 100%; height: 170px; object-fit: cover; display: block; }
    .card-image-placeholder {
      width: 100%; height: 170px;
      background: linear-gradient(135deg, #e8e3d8, #d5cfc3);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
    }

    .card-body { padding: 12px 14px 14px; }

    .card-source {
      font-size: 0.65rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 5px;
    }

    .source-ng { color: var(--green); }
    .source-gl { color: var(--tag-global); }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700;
      line-height: 1.35; margin-bottom: 7px;
    }

    .card-desc {
      font-size: 0.8rem; color: #666; line-height: 1.5; margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-time { font-size: 0.68rem; color: #aaa; }

    .loading {
      display: flex; flex-direction: column;
      align-items: center; padding: 60px 20px; gap: 14px; color: #888;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #ddd; border-top-color: var(--green);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fff5f5; border: 1px solid #ffcccc;
      border-radius: 10px; padding: 20px;
      text-align: center; color: #c0392b; font-size: 0.85rem; margin: 20px 0;
    }

    /* Countdown bar */
    .countdown-bar-wrap {
      background: rgba(0,0,0,0.08);
      height: 3px;
      width: 100%;
      margin-top: 0;
    }

    .countdown-bar {
      height: 3px;
      background: #e74c3c;
      width: 100%;
      transition: width 1s linear;
    }

    .footer-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--ink); color: rgba(255,255,255,0.5);
      text-align: center; padding: 10px; font-size: 0.65rem; letter-spacing: 1px;
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.10s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.20s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.30s; }
    .card:nth-child(7) { animation-delay: 0.35s; }
    .card:nth-child(8) { animation-delay: 0.40s; }
    .card:nth-child(9) { animation-delay: 0.45s; }
    .card:nth-child(10) { animation-delay: 0.50s; }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <div>
        <div class="brand-name">Naija<span>World</span></div>
        <div class="brand-tagline">Live News &bull; Auto-Updates</div>
      </div>
      <button class="refresh-btn" onclick="manualRefresh()">⟳ Refresh</button>
    </div>
    <div class="header-bar">
      <span class="last-updated" id="last-updated">Fetching news...</span>
      <div class="live-badge">
        <div class="pulse-dot"></div>
        <span id="next-refresh">LIVE</span>
      </div>
    </div>
    <div class="countdown-bar-wrap">
      <div class="countdown-bar" id="countdown-bar"></div>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active-nigeria" id="tab-ng" onclick="switchTab('nigeria')">🇳🇬 Nigerian News</div>
    <div class="tab" id="tab-gl" onclick="switchTab('global')">🌍 Global News</div>
  </div>

  <div class="section active" id="section-nigeria">
    <div class="section-label"><span class="dot dot-ng"></span> Nigerian Headlines</div>
    <div class="cards-grid" id="nigeria-cards">
      <div class="loading"><div class="spinner"></div><span>Loading Nigerian news...</span></div>
    </div>
  </div>

  <div class="section" id="section-global">
    <div class="section-label"><span class="dot dot-gl"></span> Global Headlines</div>
    <div class="cards-grid" id="global-cards">
      <div class="loading"><div class="spinner"></div><span>Loading global news...</span></div>
    </div>
  </div>

  <div class="footer-bar">NAIJAWORLD NEWS &bull; AUTO-UPDATES EVERY 30 MIN</div>

  <script>
    const API_KEY = '12c9710bdcf6527f3c89b396d7581ae5';
    const REFRESH_INTERVAL_MS = 30 * 60 * 1000; // 30 minutes
    const REFRESH_MINUTES = 30;

    let refreshTimer = null;
    let countdownInterval = null;
    let secondsLeft = REFRESH_MINUTES * 60;

    // Track seen article URLs to detect new ones
    let seenUrls = { nigeria: new Set(), global: new Set() };
    let isFirstLoad = true;

    function switchTab(tab) {
      document.getElementById('section-nigeria').classList.remove('active');
      document.getElementById('section-global').classList.remove('active');
      document.getElementById('tab-ng').className = 'tab';
      document.getElementById('tab-gl').className = 'tab';
      if (tab === 'nigeria') {
        document.getElementById('section-nigeria').classList.add('active');
        document.getElementById('tab-ng').className = 'tab active-nigeria';
      } else {
        document.getElementById('section-global').classList.add('active');
        document.getElementById('tab-gl').className = 'tab active-global';
      }
    }

    async function fetchNews(query, containerId, sourceClass, seenKey) {
      const container = document.getElementById(containerId);
      const isFirstFetch = seenUrls[seenKey].size === 0;

      if (isFirstFetch) {
        container.innerHTML = `<div class="loading"><div class="spinner"></div><span>Loading...</span></div>`;
      }

      const url = `https://gnews.io/api/v4/search?q=${encodeURIComponent(query)}&lang=en&max=10&sortby=publishedAt&apikey=${API_KEY}`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.errors) throw new Error(data.errors[0] || 'API error');
        if (!data.articles || data.articles.length === 0) {
          if (isFirstFetch) container.innerHTML = `<div class="error-box">No articles found. Try refreshing.</div>`;
          return;
        }

        // Find new articles not seen before
        const newArticles = data.articles.filter(a => a.url && !seenUrls[seenKey].has(a.url));
        const allArticles = data.articles;

        // Add all current URLs to seen set
        allArticles.forEach(a => { if (a.url) seenUrls[seenKey].add(a.url); });

        // On first load, render everything normally
        if (isFirstFetch) {
          container.innerHTML = '';
          allArticles.forEach(article => {
            if (!article.title) return;
            container.appendChild(buildCard(article, sourceClass, false));
          });
        } else if (newArticles.length > 0) {
          // Prepend only new articles at the top
          newArticles.reverse().forEach(article => {
            if (!article.title) return;
            const card = buildCard(article, sourceClass, true);
            card.style.animationDelay = '0s';
            container.prepend(card);
          });
        }

      } catch (err) {
        if (isFirstFetch) {
          container.innerHTML = `
            <div class="error-box">
              ⚠️ Could not load news.<br><small>${err.message}</small><br><br>
              <button onclick="fetchAllNews()" style="margin-top:8px;padding:8px 18px;background:#c0392b;color:white;border:none;border-radius:20px;cursor:pointer;">Try Again</button>
            </div>`;
        }
      }
    }

    function buildCard(article, sourceClass, isNew) {
      const card = document.createElement('a');
      card.className = 'card' + (isNew ? ' is-new' : '');
      card.href = article.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      const timeAgo = getTimeAgo(article.publishedAt);
      const sourceName = article.source?.name || 'Unknown Source';
      const newBadge = isNew ? `<span class="new-badge">New</span>` : '';
      const imageHtml = article.image
        ? `<img class="card-image" src="${article.image}" alt="" onerror="this.parentNode.innerHTML='<div class=\\'card-image-placeholder\\'>📰</div>'" loading="lazy"/>`
        : `<div class="card-image-placeholder">📰</div>`;

      card.innerHTML = `
        ${imageHtml}
        <div class="card-body">
          <div class="card-source ${sourceClass}">${sourceName}${newBadge}</div>
          <div class="card-title">${article.title}</div>
          ${article.description ? `<div class="card-desc">${article.description}</div>` : ''}
          <div class="card-time">🕐 ${timeAgo}</div>
        </div>`;
      return card;
    }

    function getTimeAgo(dateStr) {
      const diff = Math.floor((new Date() - new Date(dateStr)) / 1000);
      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)} min ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)} hr ago`;
      return `${Math.floor(diff / 86400)} day(s) ago`;
    }

    function fetchAllNews() {
      fetchNews('Nigeria', 'nigeria-cards', 'source-ng', 'nigeria');
      fetchNews('world news', 'global-cards', 'source-gl', 'global');
      const now = new Date();
      document.getElementById('last-updated').textContent =
        `Updated: ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
      startCountdown();
    }

    function manualRefresh() {
      clearInterval(countdownInterval);
      clearTimeout(refreshTimer);
      fetchAllNews();
    }

    function startCountdown() {
      clearInterval(countdownInterval);
      clearTimeout(refreshTimer);
      secondsLeft = REFRESH_MINUTES * 60;

      const bar = document.getElementById('countdown-bar');
      const label = document.getElementById('next-refresh');

      bar.style.width = '100%';

      countdownInterval = setInterval(() => {
        secondsLeft--;
        const pct = (secondsLeft / (REFRESH_MINUTES * 60)) * 100;
        bar.style.width = pct + '%';

        const mins = Math.floor(secondsLeft / 60);
        const secs = secondsLeft % 60;
        label.textContent = `Next in ${mins}:${secs.toString().padStart(2, '0')}`;

        if (secondsLeft <= 0) clearInterval(countdownInterval);
      }, 1000);

      refreshTimer = setTimeout(fetchAllNews, REFRESH_INTERVAL_MS);
    }

    fetchAllNews();
  </script>
</body>
</html>
