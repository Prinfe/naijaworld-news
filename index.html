<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NaijaWorld News</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #008751;
      --white: #f5f0e8;
      --ink: #1a1a1a;
      --gold: #c9a84c;
      --card-bg: #ffffff;
      --border: #e2ddd4;
      --section-bg: #f9f6f0;
      --tag-global: #1a3a5c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--white);
      font-family: 'Source Sans 3', sans-serif;
      color: var(--ink);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--green);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
    }

    .brand {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .brand-name span {
      color: var(--gold);
    }

    .brand-tagline {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .refresh-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-family: 'Source Sans 3', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-btn:hover { background: rgba(255,255,255,0.25); }
    .refresh-btn .icon { font-size: 0.9rem; }

    .header-bar {
      background: var(--gold);
      padding: 5px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .last-updated {
      font-size: 0.68rem;
      color: rgba(26,26,26,0.75);
      letter-spacing: 0.5px;
    }

    .next-refresh {
      font-size: 0.68rem;
      color: rgba(26,26,26,0.75);
      font-weight: 600;
    }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--card-bg);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 88px;
      z-index: 90;
    }

    .tab {
      flex: 1;
      padding: 13px 10px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #888;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .tab.active-nigeria {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    .tab.active-global {
      color: var(--tag-global);
      border-bottom-color: var(--tag-global);
    }

    /* SECTIONS */
    .section {
      display: none;
      padding: 16px 14px 80px;
    }

    .section.active { display: block; }

    .section-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-ng { background: var(--green); }
    .dot-gl { background: var(--tag-global); }

    /* CARDS */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,0.07);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
      animation: fadeUp 0.4s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card:active { transform: scale(0.98); }

    .card-image {
      width: 100%;
      height: 170px;
      object-fit: cover;
      display: block;
      background: #e5e0d8;
    }

    .card-image-placeholder {
      width: 100%;
      height: 170px;
      background: linear-gradient(135deg, #e8e3d8, #d5cfc3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .card-body {
      padding: 12px 14px 14px;
    }

    .card-source {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 5px;
    }

    .source-ng { color: var(--green); }
    .source-gl { color: var(--tag-global); }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 7px;
      color: var(--ink);
    }

    .card-desc {
      font-size: 0.8rem;
      color: #666;
      line-height: 1.5;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-time {
      font-size: 0.68rem;
      color: #aaa;
    }

    /* LOADING */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      gap: 14px;
      color: #888;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #ddd;
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 0.85rem; }

    /* ERROR */
    .error-box {
      background: #fff5f5;
      border: 1px solid #ffcccc;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      color: #c0392b;
      font-size: 0.85rem;
      margin: 20px 0;
    }

    /* EMPTY */
    .empty-box {
      text-align: center;
      padding: 50px 20px;
      color: #aaa;
      font-size: 0.85rem;
    }

    /* FOOTER */
    .footer-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--ink);
      color: rgba(255,255,255,0.5);
      text-align: center;
      padding: 10px;
      font-size: 0.65rem;
      letter-spacing: 1px;
    }

    /* Stagger animation delay */
    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.2s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.3s; }
    .card:nth-child(7) { animation-delay: 0.35s; }
    .card:nth-child(8) { animation-delay: 0.4s; }
    .card:nth-child(9) { animation-delay: 0.45s; }
    .card:nth-child(10) { animation-delay: 0.5s; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-top">
      <div class="brand">
        <div class="brand-name">Naija<span>World</span></div>
        <div class="brand-tagline">News &bull; Updated Every Hour</div>
      </div>
      <button class="refresh-btn" onclick="manualRefresh()">
        <span class="icon">⟳</span> Refresh
      </button>
    </div>
    <div class="header-bar">
      <span class="last-updated" id="last-updated">Fetching news...</span>
      <span class="next-refresh" id="next-refresh"></span>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active-nigeria" id="tab-ng" onclick="switchTab('nigeria')">🇳🇬 Nigerian News</div>
    <div class="tab" id="tab-gl" onclick="switchTab('global')">🌍 Global News</div>
  </div>

  <!-- NIGERIAN NEWS SECTION -->
  <div class="section active" id="section-nigeria">
    <div class="section-label">
      <span class="dot dot-ng"></span> Nigerian Headlines
    </div>
    <div class="cards-grid" id="nigeria-cards">
      <div class="loading">
        <div class="spinner"></div>
        <span class="loading-text">Loading Nigerian news...</span>
      </div>
    </div>
  </div>

  <!-- GLOBAL NEWS SECTION -->
  <div class="section" id="section-global">
    <div class="section-label">
      <span class="dot dot-gl"></span> Global Headlines
    </div>
    <div class="cards-grid" id="global-cards">
      <div class="loading">
        <div class="spinner"></div>
        <span class="loading-text">Loading global news...</span>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer-bar">NAIJAWORLD NEWS &bull; POWERED BY NEWSAPI</div>

  <script>
    const API_KEY = 'cc5d33e628dc4b83a014e37dadbcd78f';
    let refreshTimer = null;
    let countdownInterval = null;
    let minutesLeft = 60;

    // ─── TAB SWITCHING ───────────────────────────────────────────────────────
    function switchTab(tab) {
      document.getElementById('section-nigeria').classList.remove('active');
      document.getElementById('section-global').classList.remove('active');
      document.getElementById('tab-ng').className = 'tab';
      document.getElementById('tab-gl').className = 'tab';

      if (tab === 'nigeria') {
        document.getElementById('section-nigeria').classList.add('active');
        document.getElementById('tab-ng').className = 'tab active-nigeria';
      } else {
        document.getElementById('section-global').classList.add('active');
        document.getElementById('tab-gl').className = 'tab active-global';
      }
    }

    // ─── FETCH NEWS ──────────────────────────────────────────────────────────
    async function fetchNews(query, containerId, sourceClass) {
      const container = document.getElementById(containerId);
      container.innerHTML = `<div class="loading"><div class="spinner"></div><span class="loading-text">Loading...</span></div>`;

      const url = `https://newsapi.org/v2/everything?q=${encodeURIComponent(query)}&sortBy=publishedAt&pageSize=10&language=en&apiKey=${API_KEY}`;

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.status !== 'ok') throw new Error(data.message || 'API error');
        if (!data.articles || data.articles.length === 0) {
          container.innerHTML = `<div class="empty-box">No news articles found right now. Try refreshing.</div>`;
          return;
        }

        container.innerHTML = '';
        data.articles.forEach(article => {
          if (!article.title || article.title === '[Removed]') return;
          const card = buildCard(article, sourceClass);
          container.appendChild(card);
        });

      } catch (err) {
        container.innerHTML = `<div class="error-box">⚠️ Could not load news.<br><small>${err.message}</small><br><br><button onclick="fetchAllNews()" style="margin-top:8px;padding:8px 18px;background:#c0392b;color:white;border:none;border-radius:20px;cursor:pointer;">Try Again</button></div>`;
      }
    }

    // ─── BUILD CARD ──────────────────────────────────────────────────────────
    function buildCard(article, sourceClass) {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = article.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      const timeAgo = getTimeAgo(article.publishedAt);
      const sourceName = article.source?.name || 'Unknown Source';

      let imageHtml = '';
      if (article.urlToImage) {
        imageHtml = `<img class="card-image" src="${article.urlToImage}" alt="" onerror="this.parentNode.innerHTML='<div class=\\'card-image-placeholder\\'>📰</div>'" loading="lazy"/>`;
      } else {
        imageHtml = `<div class="card-image-placeholder">📰</div>`;
      }

      card.innerHTML = `
        ${imageHtml}
        <div class="card-body">
          <div class="card-source ${sourceClass}">${sourceName}</div>
          <div class="card-title">${article.title}</div>
          ${article.description ? `<div class="card-desc">${article.description}</div>` : ''}
          <div class="card-time">🕐 ${timeAgo}</div>
        </div>
      `;
      return card;
    }

    // ─── TIME AGO ────────────────────────────────────────────────────────────
    function getTimeAgo(dateStr) {
      const now = new Date();
      const then = new Date(dateStr);
      const diff = Math.floor((now - then) / 1000);
      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)} min ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)} hr ago`;
      return `${Math.floor(diff / 86400)} day(s) ago`;
    }

    // ─── FETCH ALL ───────────────────────────────────────────────────────────
    function fetchAllNews() {
      fetchNews('Nigeria', 'nigeria-cards', 'source-ng');
      fetchNews('world OR international OR global', 'global-cards', 'source-gl');

      const now = new Date();
      document.getElementById('last-updated').textContent =
        `Updated: ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

      startCountdown();
    }

    // ─── MANUAL REFRESH ──────────────────────────────────────────────────────
    function manualRefresh() {
      clearInterval(countdownInterval);
      clearTimeout(refreshTimer);
      minutesLeft = 60;
      fetchAllNews();
    }

    // ─── AUTO REFRESH EVERY 60 MINUTES ──────────────────────────────────────
    function startCountdown() {
      clearInterval(countdownInterval);
      clearTimeout(refreshTimer);
      minutesLeft = 60;

      countdownInterval = setInterval(() => {
        minutesLeft--;
        document.getElementById('next-refresh').textContent =
          `Next refresh in ${minutesLeft} min`;
        if (minutesLeft <= 0) {
          clearInterval(countdownInterval);
        }
      }, 60000);

      document.getElementById('next-refresh').textContent = `Next refresh in 60 min`;

      refreshTimer = setTimeout(() => {
        fetchAllNews();
      }, 60 * 60 * 1000);
    }

    // ─── INIT ────────────────────────────────────────────────────────────────
    fetchAllNews();
  </script>
</body>
</html>
